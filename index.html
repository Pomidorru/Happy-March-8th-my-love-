<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Happy March 8th my love!</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:       #ff69b4;
      --deep-rose:  #ff1493;
      --crimson:    #c71585;
      --gold-rose:  #e8829a;
      --black:      #000000;
      --black-soft: #0a0a0a;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--black);
      font-family: 'Great Vibes', cursive;
      cursor: none;
    }

    #vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%,
        rgba(0,0,0,0.55) 65%,
        rgba(0,0,0,0.92) 100%);
      z-index: 90;
      pointer-events: none;
    }

    #grain {
      position: fixed;
      inset: 0;
      z-index: 95;
      pointer-events: none;
      opacity: 0;
      animation: grainReveal 1s 7s ease forwards;
    }
    #grain::after {
      content: '';
      position: absolute;
      inset: -200%;
      width: 400%; height: 400%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      animation: grainScroll 0.4s steps(2) infinite;
      mix-blend-mode: overlay;
    }
    @keyframes grainReveal { to { opacity: 1; } }
    @keyframes grainScroll {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-3%,-5%); }
      50%  { transform: translate(5%,3%); }
      75%  { transform: translate(-5%,5%); }
      100% { transform: translate(3%,-3%); }
    }

    #canvas {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #glow-heart {
      position: absolute;
      width: 200px;
      height: 200px;
      opacity: 0;
      transform: scale(0);
      animation: heartBloom 3s 0.2s cubic-bezier(0.22,1,0.36,1) forwards, heartPulse 2s 3.2s ease-in-out infinite, heartFade 1s 5s ease forwards;
      z-index: 15;
    }
    #glow-heart svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 40px rgba(255,105,180,0.5)) drop-shadow(0 0 80px rgba(199,21,133,0.3));
    }
    @keyframes heartBloom {
      0%   { opacity: 0; transform: scale(0); }
      60%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0.8; transform: scale(0.95); }
    }
    @keyframes heartPulse {
      0%,100% { transform: scale(0.95); }
      50%     { transform: scale(1.05); }
    }
    @keyframes heartFade {
      to { opacity: 0; }
    }

    #box-wrap {
      position: absolute;
      width: 140px; height: 140px;
      opacity: 0;
      animation: boxAppear 0.8s 2.8s ease forwards;
      z-index: 30;
    }
    @keyframes boxAppear {
      from { opacity: 0; transform: scale(0.7) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #box-body {
      position: absolute;
      bottom: 0; left: 0;
      width: 140px; height: 100px;
      background: linear-gradient(145deg, #1a0010, #0d0008);
      border: 1px solid rgba(255,105,180,0.25);
      border-radius: 4px 4px 8px 8px;
      box-shadow:
        0 0 30px rgba(255,20,147,0.3),
        inset 0 0 20px rgba(255,105,180,0.05);
      overflow: hidden;
    }
    #box-body::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 2px; height: 100%;
      background: linear-gradient(to bottom, var(--deep-rose), var(--crimson));
      box-shadow: 0 0 8px var(--rose);
    }
    #box-body::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; transform: translateY(-50%);
      width: 100%; height: 2px;
      background: linear-gradient(to right, var(--crimson), var(--deep-rose), var(--crimson));
      box-shadow: 0 0 8px var(--rose);
    }

    #box-lid {
      position: absolute;
      top: 0; left: -4px;
      width: 148px; height: 44px;
      background: linear-gradient(145deg, #220015, #10000a);
      border: 1px solid rgba(255,105,180,0.3);
      border-radius: 6px;
      transform-origin: top center;
      transform: rotateX(0deg);
      box-shadow:
        0 0 20px rgba(255,20,147,0.35),
        inset 0 0 12px rgba(255,105,180,0.08);
      animation: lidOpen 1.2s 4s cubic-bezier(0.68,-0.3,0.32,1.2) forwards;
    }
    @keyframes lidOpen {
      0%   { transform: rotateX(0deg) translateY(0); }
      40%  { transform: rotateX(-70deg) translateY(-10px); }
      100% { transform: rotateX(-110deg) translateY(-16px); }
    }

    #bow {
      position: absolute;
      top: -14px; left: 50%; transform: translateX(-50%);
      width: 48px; height: 28px;
    }
    #bow::before, #bow::after {
      content: '';
      position: absolute;
      top: 0;
      width: 22px; height: 24px;
      border-radius: 50% 50% 0 50%;
      background: radial-gradient(circle, var(--rose) 0%, var(--crimson) 100%);
      box-shadow: 0 0 10px var(--rose), 0 0 25px rgba(255,105,180,0.4);
      opacity: 0.9;
    }
    #bow::before { left: 0;  transform: rotate(-40deg); }
    #bow::after  { right: 0; transform: rotate(40deg) scaleX(-1); }

    #box-burst {
      position: absolute;
      bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--rose);
      opacity: 0;
      animation: burstBig 1.5s 4.8s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes burstBig {
      0%   { opacity: 0; transform: translateX(-50%) scale(1);
             box-shadow: 0 0 0 0 rgba(255,105,180,0); }
      30%  { opacity: 1;
             box-shadow: 0 0 60px 40px rgba(255,105,180,0.55),
                         0 0 120px 80px rgba(255,20,147,0.3); }
      100% { opacity: 0; transform: translateX(-50%) scale(4);
             box-shadow: 0 0 200px 140px rgba(255,105,180,0); }
    }

    #box-wrap.fade-out {
      animation: boxFade 1s ease forwards;
    }
    @keyframes boxFade {
      to { opacity: 0; transform: scale(0.85) translateY(-10px); }
    }

    #name-wrap {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: scale(0.85);
      animation: nameReveal 2s 7.5s cubic-bezier(0.22,1,0.36,1) forwards;
      z-index: 40;
    }
    @keyframes nameReveal {
      0%   { opacity: 0; transform: scale(0.85); filter: blur(12px); }
      60%  { opacity: 1; transform: scale(1.04); filter: blur(0px); }
      100% { opacity: 1; transform: scale(1);    filter: blur(0px); }
    }

    #name-wrap.shift-up {
      animation: nameShiftUp 1.5s 22s cubic-bezier(0.22,1,0.36,1) forwards;
    }

@keyframes nameShiftUp {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(150px) scale(0.9); }
}

    #scene.zooming {
      animation: cameraZoom 8s 9s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes cameraZoom {
      0%   { transform: scale(1)    translateY(0); }
      100% { transform: scale(1.08) translateY(-1vh); }
    }

    #name-text {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.8rem, 14vw, 7.5rem);
      color: transparent;
      background: linear-gradient(135deg, #ffb6c8 0%, var(--rose) 40%, var(--gold-rose) 70%, var(--deep-rose) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: none;
      filter:
        drop-shadow(0 0 12px rgba(255,105,180,0.8))
        drop-shadow(0 0 40px rgba(255,20,147,0.5))
        drop-shadow(0 0 80px rgba(199,21,133,0.3));
      animation: heartbeatPulse 2.4s 10s ease-in-out infinite;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    @keyframes heartbeatPulse {
      0%,100% { transform: scale(1);    filter: drop-shadow(0 0 12px rgba(255,105,180,0.8)) drop-shadow(0 0 40px rgba(255,20,147,0.5)); }
      14%      { transform: scale(1.04); filter: drop-shadow(0 0 20px rgba(255,105,180,1))   drop-shadow(0 0 60px rgba(255,20,147,0.7)); }
      28%      { transform: scale(1);    filter: drop-shadow(0 0 12px rgba(255,105,180,0.8)) drop-shadow(0 0 40px rgba(255,20,147,0.5)); }
      42%      { transform: scale(1.025);filter: drop-shadow(0 0 16px rgba(255,105,180,0.9)) drop-shadow(0 0 50px rgba(255,20,147,0.6)); }
    }

    #name-line {
      width: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--rose), var(--deep-rose), var(--rose), transparent);
      box-shadow: 0 0 10px var(--rose), 0 0 25px rgba(255,105,180,0.5);
      animation: lineExpand 1.2s 9.2s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes lineExpand {
      to { width: clamp(180px, 50vw, 380px); }
    }

    #msg-wrap {
      position: absolute;
      bottom: clamp(60px, 12vh, 140px);
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: msgFadeIn 2.5s 18s ease forwards;
      z-index: 40;
    }
    @keyframes msgFadeIn {
      0%   { opacity: 0; transform: translateY(18px); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }

    #msg-line1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 8vw, 3.8rem);
      color: transparent;
      background: linear-gradient(135deg, #ffc8d8, var(--rose), #e8829a);
      -webkit-background-clip: text;
      background-clip: text;
      filter:
        drop-shadow(0 0 8px rgba(255,105,180,0.7))
        drop-shadow(0 0 24px rgba(255,20,147,0.4));
      text-align: center;
      padding: 0 20px;
      letter-spacing: 0.03em;
    }
    #msg-line2 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.85rem, 3.2vw, 1.3rem);
      color: rgba(255,105,180,0.7);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 20px;
    }

    #msg-underline {
      width: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--deep-rose), var(--rose), transparent);
      box-shadow: 0 0 8px var(--deep-rose);
      animation: lineExpand 1s 19.5s ease forwards;
    }

    #msg-wrap.fade-out {
      animation: msgFadeOut 2s ease forwards;
    }
    @keyframes msgFadeOut {
      to { opacity: 0; transform: translateY(-10px); }
    }

    #poem-wrap {
      position: absolute;
      bottom: clamp(20px, 6vh, 60px);
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: poemFadeIn 2.5s 22s ease forwards;
      z-index: 40;
    }
    @keyframes poemFadeIn {
      0%   { opacity: 0; transform: translateY(18px); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }

    #poem-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: rgba(255,105,180,0.85);
      line-height: 1.6;
      text-align: center;
      white-space: pre-line;
      filter: drop-shadow(0 0 4px rgba(255,105,180,0.5));
    }

    #poem-signature {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(255,105,180,0.7);
      text-align: center;
    }

    #bg-glow {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 55%,
        rgba(199,21,133,0.08) 0%,
        transparent 70%);
      animation: bgGlowIn 3s 7s ease forwards;
    }
    @keyframes bgGlowIn {
      to { opacity: 1; }
    }

    #replay-btn {
      position: fixed;
      bottom: 24px; right: 20px;
      z-index: 100;
      padding: 8px 18px;
      border: 1px solid rgba(255,105,180,0.25);
      border-radius: 20px;
      background: rgba(0,0,0,0.75);
      color: rgba(255,105,180,0.65);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.5s, color 0.3s, border-color 0.3s;
      animation: btnAppear 1s 25s ease forwards;
    }
    #replay-btn:hover {
      color: var(--rose);
      border-color: rgba(255,105,180,0.5);
    }
  </style>
</head>
<body>

<div id="bg-glow"></div>

<div id="vignette"></div>
<div id="grain"></div>

<canvas id="canvas"></canvas>

<div id="scene">

  <div id="glow-heart">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff69b4" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#c71585" stop-opacity="0.8"/>
        </linearGradient>
      </defs>
      <path d="M100 180c-2-2-4-4-6-6-20-20-40-40-60-60C20 90 10 80 10 65c0-15 12-27 27-27 8 0 15 3 21 9L100 75l42-28c6-6 13-9 21-9 15 0 27 12 27 27 0 15-10 25-24 29-20 20-40 40-60 60-2 2-4 4-6 6z" fill="url(#heartGrad)" />
    </svg>
  </div>

  <div id="box-wrap">
    <div id="box-lid">
      <div id="bow"></div>
    </div>
    <div id="box-body"></div>
    <div id="box-burst"></div>
  </div>

  <div id="name-wrap">
    <div id="name-text"></div>
    <div id="name-line"></div>
  </div>

  <div id="msg-wrap">
    <div id="msg-line1"></div>
    <div id="msg-line2">с любовью, навсегда ♥</div>
    <div id="msg-underline"></div>
  </div>

  <div id="poem-wrap">
    <div id="poem-text"></div>
    <div id="poem-signature">твой Миша</div>
  </div>

</div>

<button id="music-btn" title="Музыка" aria-label="Toggle music">
  <svg id="icon-muted" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
  </svg>
  <svg id="icon-playing" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
  </svg>
</button>

<button id="replay-btn">↺ replay</button>
<audio id="audio" loop preload="none">
</audio>

<script>

  const name    = "Лиза";
  const message = `Happy March 8th my love,\u00a0${name}!`;
  const loveMsg = "Люблю тебя безумно";
  const poem = `
Сегодня март тихонько дышит,
И солнце мягче, чем вчера.
И в этом свете я всё чаще
О вас думаю с утра.

В глазах ваших — спокойный апрель,
И что-то светлое, родное.
Я рядом с вами понимаю:
Мир может быть совсем иным.

Не громко — просто тихим и родным,
Смотреть, как день в окне светлеет.
И вдруг случайно ощутить,
Что сердце к вам ещё теплее.

Пусть этот день подарит свет,
Улыбку тихую и нежность.
И пусть весна хранит для вас
Покой, тепло… и бесконечность.`;

  document.getElementById('name-text').textContent = name;
  document.getElementById('msg-line1').textContent = message;
  document.getElementById('poem-text').textContent = poem;

  const sub = document.querySelector('#msg-wrap #msg-line2');
  sub.textContent = loveMsg + " ♥";

  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  let W, H, particles = [], petals = [], running = false;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function heartPath(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size, size);
    ctx.beginPath();
    ctx.moveTo(0, -0.3);
    ctx.bezierCurveTo( 0.5, -1,  1.2, -0.2,  0,  0.8);
    ctx.bezierCurveTo(-1.2, -0.2, -0.5, -1,   0, -0.3);
    ctx.closePath();
    ctx.restore();
  }

  function createParticle() {
    const x    = W * 0.5 + (Math.random() - 0.5) * W * 0.5;
    const size = 4 + Math.random() * 10;
    return {
      x,
      y      : H + size * 2,
      size,
      speedY : -(0.6 + Math.random() * 1.4),
      speedX : (Math.random() - 0.5) * 0.8,
      rot    : Math.random() * Math.PI * 2,
      rotV   : (Math.random() - 0.5) * 0.04,
      alpha  : 0.5 + Math.random() * 0.5,
      hue    : 330 + Math.random() * 30,
      wobble : Math.random() * Math.PI * 2,
      wobbleV: 0.015 + Math.random() * 0.02,
    };
  }

  function createPetal() {
    return {
      x     : Math.random() * W,
      y     : -20,
      w     : 6 + Math.random() * 10,
      h     : 3 + Math.random() * 6,
      speedY: 0.5 + Math.random() * 1,
      speedX: (Math.random() - 0.5) * 0.5,
      rot   : Math.random() * Math.PI * 2,
      rotV  : (Math.random() - 0.5) * 0.015,
      alpha : 0.15 + Math.random() * 0.3,
      hue   : 340 + Math.random() * 20,
    };
  }

  let lastParticle = 0, lastPetal = 0;
  const PARTICLE_RATE = 180;
  const PETAL_RATE    = 280;

  function tick(ts) {
    if (!running) return;
    requestAnimationFrame(tick);
    ctx.clearRect(0, 0, W, H);

    if (ts - lastParticle > PARTICLE_RATE) {
      particles.push(createParticle());
      if (particles.length > 60) particles.shift();
      lastParticle = ts;
    }
    if (ts - lastPetal > PETAL_RATE) {
      petals.push(createPetal());
      if (petals.length > 40) petals.shift();
      lastPetal = ts;
    }

    particles.forEach(p => {
      p.wobble += p.wobbleV;
      p.x += p.speedX + Math.sin(p.wobble) * 0.4;
      p.y += p.speedY;
      p.rot += p.rotV;
      if (p.y < -40) p.y = H + 20;

      ctx.save();
      ctx.globalAlpha = p.alpha * Math.max(0, Math.min(1, (H - p.y) / (H * 0.3)));
      ctx.fillStyle = `hsl(${p.hue}, 80%, 60%)`;
      ctx.shadowColor = `hsl(${p.hue}, 100%, 65%)`;
      ctx.shadowBlur = 14;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      /* tiny heart */
      const s = p.size;
      ctx.beginPath();
      ctx.moveTo(0, -s*0.3);
      ctx.bezierCurveTo( s*0.5, -s,  s*1.2, -s*0.2,  0,  s*0.8);
      ctx.bezierCurveTo(-s*1.2, -s*0.2, -s*0.5, -s,   0, -s*0.3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });

    petals.forEach(p => {
      p.x  += p.speedX;
      p.y  += p.speedY;
      p.rot += p.rotV;
      if (p.y > H + 20) p.y = -20;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = `hsl(${p.hue}, 70%, 55%)`;
      ctx.shadowColor = `hsl(${p.hue}, 100%, 65%)`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.w, p.h, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  setTimeout(() => {
    canvas.style.opacity = '1';
    running = true;
    requestAnimationFrame(tick);
  }, 6500);

  setTimeout(() => {
    document.getElementById('box-wrap').classList.add('fade-out');
  }, 6200);

  setTimeout(() => {
    document.getElementById('scene').classList.add('zooming');
  }, 9000);

  setTimeout(() => {
    document.getElementById('name-wrap').classList.add('shift-up');
